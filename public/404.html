<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Agentic Loop</title>
    <!-- Single-Page Apps for GitHub Pages.
         GitHub Pages has no server-side history fallback, so a direct load of a
         deep link (e.g. /agentic-loop/playbooks/getting-started) serves this
         404 page. The script below encodes the requested path into a query
         string and redirects to the app root, where a snippet in index.html
         restores the original URL for React Router.
         pathSegmentsToKeep = 1 keeps the `/agentic-loop/` project-page prefix. -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
