    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <!-- Single-Page Apps for GitHub Pages: restore the real URL after the
         404.html redirect so the React Router can match the deep link. -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) { return s.replace(/~and~/g, '&'); })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      // Workaround for @vitejs/plugin-react not injecting the React Refresh
      // preamble under Vite 8 (rolldown) in dev. Wrapped in try/catch so it
      // is a no-op in production where /@react-refresh does not exist.
      try {
        if (import.meta.hot) {
          const RefreshRuntime = await import('/@react-refresh');
          RefreshRuntime.default.injectIntoGlobalHook(window);
          window.$RefreshReg$ = () => {};
          window.$RefreshSig$ = () => (type) => type;
          window.__vite_plugin_react_preamble_installed__ = true;
        }
      } catch (e) { /* production: no HMR, no preamble needed */ }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
