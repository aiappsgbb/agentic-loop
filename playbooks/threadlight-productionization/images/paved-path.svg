    <rect class="df-node" x="197" y="128" width="160" height="72" rx="12"/>
    <rect class="df-bar2" x="197" y="128" width="160" height="5" rx="2.5"/>
    <text class="df-title" x="277" y="171" text-anchor="middle">telemetry</text>

