  <rect class="df-chip" x="280" y="290" width="128" height="30" rx="15"/>
  <text class="df-chip-t" x="344" y="309" text-anchor="middle">pre-deploy</text>
  <rect class="df-chip" x="420" y="290" width="134" height="30" rx="15"/>
  <text class="df-chip-t" x="487" y="309" text-anchor="middle">post-deploy</text>
