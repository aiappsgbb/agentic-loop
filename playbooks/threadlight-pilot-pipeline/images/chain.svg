<svg viewBox="0 0 900 596" role="img" aria-label="The Threadlight pilot chain, from brief to evaluated agent" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="pp-arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" class="df-arrow"/>
    </marker>
  </defs>

  <!-- spine -->
  <g class="df-edge" marker-end="url(#pp-arr)">
    <line x1="56" y1="72" x2="56" y2="120"/>
    <line x1="56" y1="160" x2="56" y2="208"/>
    <line x1="56" y1="248" x2="56" y2="296"/>
    <line x1="56" y1="336" x2="56" y2="384"/>
    <line x1="56" y1="424" x2="56" y2="472"/>
  </g>

  <!-- stage 1: brief -->
  <line class="df-edge" x1="72" y1="56" x2="100" y2="56"/>
  <circle class="df-a2" cx="56" cy="56" r="16"/>
  <text x="56" y="60" text-anchor="middle" style="fill:#fff" font-weight="700" font-size="13">1</text>
  <rect class="df-node" x="100" y="24" width="770" height="64" rx="13"/>
  <rect class="df-bar2" x="103" y="27" width="5" height="58" rx="2.5"/>
  <text class="df-title" x="126" y="51">brief</text>
  <text class="df-sub" x="126" y="71">One paragraph of business process — the only required input.</text>

  <!-- stage 2: design -->
  <line class="df-edge" x1="72" y1="144" x2="100" y2="144"/>
  <circle class="df-a1" cx="56" cy="144" r="16"/>
  <text x="56" y="148" text-anchor="middle" style="fill:#fff" font-weight="700" font-size="13">2</text>
  <rect class="df-node" x="100" y="112" width="770" height="64" rx="13"/>
  <rect class="df-bar1" x="103" y="115" width="5" height="58" rx="2.5"/>
  <text class="df-title" x="126" y="139">threadlight-design</text>
  <text class="df-sub" x="126" y="159">specs/SPEC.md · manifest.json · AGENTS.md  — the contract every later step reads.</text>

  <!-- stage 3: local-test -->
  <line class="df-edge" x1="72" y1="232" x2="100" y2="232"/>
  <circle class="df-a1" cx="56" cy="232" r="16"/>
  <text x="56" y="236" text-anchor="middle" style="fill:#fff" font-weight="700" font-size="13">3</text>
  <rect class="df-node" x="100" y="200" width="770" height="64" rx="13"/>
  <rect class="df-bar1" x="103" y="203" width="5" height="58" rx="2.5"/>
  <text class="df-title" x="126" y="227">threadlight-local-test</text>
  <text class="df-sub" x="126" y="247">Inner loop at localhost:8501 — iterate with no azd, no cloud spend.</text>

  <!-- stage 4: deploy -->
  <line class="df-edge" x1="72" y1="320" x2="100" y2="320"/>
  <circle class="df-a1" cx="56" cy="320" r="16"/>
  <text x="56" y="324" text-anchor="middle" style="fill:#fff" font-weight="700" font-size="13">4</text>
  <rect class="df-node" x="100" y="288" width="770" height="64" rx="13"/>
  <rect class="df-bar1" x="103" y="291" width="5" height="58" rx="2.5"/>
  <text class="df-title" x="126" y="315">threadlight-deploy</text>
  <text class="df-sub" x="126" y="335">azd up → ACR · Bicep/AVM · Foundry hosted agent.</text>

  <!-- stage 5: safe-check -->
  <line class="df-edge" x1="72" y1="408" x2="100" y2="408"/>
  <circle class="df-a4" cx="56" cy="408" r="16"/>
  <text x="56" y="412" text-anchor="middle" style="fill:#0c0f16" font-weight="700" font-size="13">5</text>
  <rect class="df-node" x="100" y="376" width="770" height="64" rx="13"/>
  <rect class="df-bar4" x="103" y="379" width="5" height="58" rx="2.5"/>
  <text class="df-title" x="126" y="403">threadlight-safe-check  ·  --phase post-deploy</text>
  <text class="df-sub" x="126" y="423">Mandatory gate. The chain refuses to ship unless  gaps: []</text>

  <!-- stage 6: evals + obs -->
  <line class="df-edge" x1="72" y1="496" x2="100" y2="496"/>
  <circle class="df-a3" cx="56" cy="496" r="16"/>
  <text x="56" y="500" text-anchor="middle" style="fill:#fff" font-weight="700" font-size="13">6</text>
  <rect class="df-node" x="100" y="464" width="770" height="64" rx="13"/>
  <rect class="df-bar3" x="103" y="467" width="5" height="58" rx="2.5"/>
  <text class="df-title" x="126" y="491">foundry-evals  +  foundry-observability</text>
  <text class="df-sub" x="126" y="511">Traces · regression sets · the improvement flywheel.</text>

  <!-- optional steps footnote -->
  <text class="df-kicker" x="100" y="556">Optional skills — slot in anywhere:</text>
  <rect class="df-chip" x="100" y="568" width="172" height="20" rx="10"/>
  <text class="df-chip-t" x="186" y="581.5" text-anchor="middle">demo-data-factory</text>
  <rect class="df-chip" x="284" y="568" width="132" height="20" rx="10"/>
  <text class="df-chip-t" x="350" y="581.5" text-anchor="middle">hitl-patterns</text>
  <rect class="df-chip" x="428" y="568" width="138" height="20" rx="10"/>
  <text class="df-chip-t" x="497" y="581.5" text-anchor="middle">workspace-ui</text>
  <rect class="df-chip" x="578" y="568" width="142" height="20" rx="10"/>
  <text class="df-chip-t" x="649" y="581.5" text-anchor="middle">event-triggers</text>
</svg>
